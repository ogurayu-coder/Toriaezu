<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>わんこノート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5EFE3;
    --paper-deep:#EDE4D2;
    --ink:#2B3A2A;
    --ink-soft:#5B6B58;
    --line:#DAD0BA;
    --meal:#C97B3D;
    --walk:#3F7D6B;
    --poop:#8B6F4E;
    --med:#A63D40;
    --note:#5B5F97;
    --card:#FFFDF8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  .display{font-family:'Baloo 2',sans-serif;}

  header{
    padding:22px 18px 14px;
    position:sticky;
    top:0;
    background:var(--paper);
    z-index:20;
    border-bottom:1px solid var(--line);
  }
  header h1{
    margin:0 0 14px;
    font-size:22px;
    font-weight:700;
    letter-spacing:.2px;
  }
  header h1 span{color:var(--walk);}

  /* Dog tags — collar tag motif */
  .tags{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:4px;
    scrollbar-width:none;
  }
  .tags::-webkit-scrollbar{display:none;}
  .tag{
    position:relative;
    flex:0 0 auto;
    min-width:78px;
    padding:14px 10px 10px;
    border-radius:14px;
    background:var(--card);
    border:2px solid var(--line);
    text-align:center;
    cursor:pointer;
    transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    font-family:'Baloo 2',sans-serif;
  }
  .tag::before{
    content:'';
    position:absolute;
    top:-6px;
    left:50%;
    transform:translateX(-50%);
    width:12px;
    height:12px;
    border-radius:50%;
    background:var(--paper);
    border:2px solid var(--line);
    transition:border-color .18s ease;
  }
  .tag .icon{display:block;margin:0 auto 4px;width:34px;height:34px;}
  .tag .name{font-size:14px;font-weight:600;color:var(--ink-soft);}
  .tag.active{
    transform:translateY(-4px) scale(1.04);
    box-shadow:0 6px 14px rgba(43,58,42,.15);
  }
  .tag.active::before{border-color:var(--dogcolor);}
  .tag.active{border-color:var(--dogcolor);}
  .tag.active .name{color:var(--ink);}

  main{padding:18px;max-width:640px;margin:0 auto;}

  .today-strip{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:14px;
  }
  .today-strip .dogname{
    font-family:'Baloo 2',sans-serif;
    font-size:19px;
    font-weight:700;
  }
  .today-strip .sub{font-size:12px;color:var(--ink-soft);}

  /* Quick add buttons */
  .quickadd{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:8px;
    margin-bottom:22px;
  }
  .qbtn{
    border:none;
    border-radius:12px;
    padding:10px 2px;
    background:var(--card);
    border:1px solid var(--line);
    font-family:'Inter',sans-serif;
    font-size:11px;
    font-weight:600;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    cursor:pointer;
    transition:transform .12s ease;
  }
  .qbtn:active{transform:scale(.94);}
  .qbtn .ic{font-size:19px;}
  .qbtn.meal{border-bottom:3px solid var(--meal);}
  .qbtn.walk{border-bottom:3px solid var(--walk);}
  .qbtn.poop{border-bottom:3px solid var(--poop);}
  .qbtn.med{border-bottom:3px solid var(--med);}
  .qbtn.note{border-bottom:3px solid var(--note);}

  .daylabel{
    font-size:12px;
    font-weight:700;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:.6px;
    margin:22px 0 8px;
  }

  .entry{
    display:flex;
    gap:12px;
    background:var(--card);
    border-radius:12px;
    padding:12px 14px;
    margin-bottom:8px;
    border-left:4px solid var(--c);
    box-shadow:0 1px 3px rgba(43,58,42,.06);
    position:relative;
  }
  .entry .ic{font-size:18px;line-height:1;padding-top:2px;}
  .entry .body{flex:1;min-width:0;}
  .entry .time{font-size:11px;color:var(--ink-soft);font-weight:600;}
  .entry .text{font-size:14px;margin-top:2px;word-break:break-word;}
  .entry .del{
    background:none;border:none;color:var(--ink-soft);
    font-size:16px;cursor:pointer;padding:2px 4px;opacity:.5;
  }
  .empty{
    text-align:center;
    padding:40px 20px;
    color:var(--ink-soft);
    font-size:13px;
  }

  /* Modal */
  .overlay{
    position:fixed;inset:0;background:rgba(43,58,42,.4);
    display:flex;align-items:flex-end;justify-content:center;
    z-index:50;opacity:0;pointer-events:none;transition:opacity .2s ease;
  }
  .overlay.show{opacity:1;pointer-events:auto;}
  .sheet{
    background:var(--paper);
    width:100%;max-width:640px;
    max-height:88vh;
    overflow-y:auto;
    border-radius:20px 20px 0 0;
    padding:20px 18px 26px;
    transform:translateY(20px);
    transition:transform .2s ease;
  }
  .overlay.show .sheet{transform:translateY(0);}
  .sheet h2{
    font-family:'Baloo 2',sans-serif;
    font-size:18px;margin:0 0 14px;
    display:flex;align-items:center;gap:8px;
  }
  .sheet textarea{
    width:100%;min-height:80px;
    border-radius:12px;border:1px solid var(--line);
    padding:12px;font-family:'Inter',sans-serif;font-size:14px;
    resize:none;background:var(--card);
    margin-bottom:12px;
  }
  .sheet input[type=time]{
    border-radius:10px;border:1px solid var(--line);
    padding:8px 10px;font-family:'Inter',sans-serif;font-size:14px;
    background:var(--card);margin-bottom:12px;
  }
  .chiprow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .chip{
    border:1px solid var(--line);background:var(--card);
    border-radius:20px;padding:6px 12px;font-size:12px;
    cursor:pointer;color:var(--ink-soft);
  }
  .chip.sel{background:var(--c);color:#fff;border-color:var(--c);}
  .sheet .actions{display:flex;gap:10px;}
  .sheet button.save, .sheet button.cancel{
    flex:1;border:none;border-radius:12px;padding:13px;
    font-family:'Inter',sans-serif;font-weight:700;font-size:14px;cursor:pointer;
  }
  .sheet button.save{background:var(--ink);color:var(--paper);}
  .sheet button.cancel{background:var(--card);color:var(--ink-soft);border:1px solid var(--line);}

  .status{
    text-align:center;font-size:11px;color:var(--ink-soft);
    padding:10px;
  }

  /* Calendar */
  .calendarPanel{
    display:none;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 6px;
    margin-bottom:14px;
    overflow:hidden;
  }
  .cal-nav{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:10px;
    padding:0 4px;
  }
  .cal-nav button{
    background:none;border:none;font-size:18px;color:var(--ink);
    cursor:pointer;padding:4px 12px;line-height:1;
  }
  .cal-nav .cal-label{
    font-family:'Baloo 2',sans-serif;font-weight:700;font-size:15px;
  }
  .cal-grid{
    display:grid;grid-template-columns:repeat(7,1fr);gap:3px;
    width:100%;
  }
  .cal-wd{
    text-align:center;font-size:10px;color:var(--ink-soft);
    font-weight:700;padding-bottom:4px;
  }
  .cal-day{
    position:relative;aspect-ratio:1;
    min-width:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-radius:8px;font-size:11px;color:var(--ink);
    cursor:pointer;background:var(--paper);
    border:1px solid transparent;
    padding:1px;
  }
  .cal-day.empty{visibility:hidden;cursor:default;}
  .cal-day.today{border-color:var(--walk);font-weight:700;}
  .cal-day.has-note{background:rgba(91,95,151,.16);}
  .cal-day .dots{display:flex;gap:2px;margin-top:2px;min-height:5px;}
  .cal-day .dot{width:5px;height:5px;border-radius:50%;}
  .cal-day .star{position:absolute;top:1px;right:2px;font-size:8px;}
  .cal-day .note-snippet{
    font-size:8px;
    line-height:1.1;
    color:var(--note);
    margin-top:1px;
    max-width:100%;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    padding:0 1px;
  }
  .cal-legend{
    display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;
    font-size:10px;color:var(--ink-soft);
    padding:0 4px;
  }
  .cal-legend span{display:inline-flex;align-items:center;gap:4px;}
  .cal-legend .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}

  /* First-time setup screen */
  #setupScreen{display:none;min-height:100vh;padding:36px 20px;}
  .setup-wrap{max-width:480px;margin:0 auto;}
  .setup-wrap h1{
    font-family:'Baloo 2',sans-serif;font-size:23px;margin:0 0 8px;
  }
  .setup-wrap p.lead{font-size:13px;color:var(--ink-soft);margin:0 0 24px;line-height:1.6;}
  .setup-row{
    background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:14px;margin-bottom:12px;
  }
  .setup-row-top{display:flex;gap:8px;margin-bottom:8px;}
  .setup-name{
    flex:1;padding:10px 12px;border-radius:10px;border:1px solid var(--line);
    background:var(--paper);font-family:'Inter',sans-serif;font-size:14px;
  }
  .setup-remove{
    border:none;background:none;color:var(--ink-soft);font-size:18px;
    cursor:pointer;padding:0 6px;
  }
  .setup-sub{
    width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--line);
    background:var(--paper);font-family:'Inter',sans-serif;font-size:12px;margin-bottom:10px;
  }
  .setup-field-label{font-size:12px;color:var(--ink);font-weight:700;margin:10px 0 6px;}
  .setup-colors{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:6px;}
  .setup-color-swatch{
    width:30px;height:30px;border-radius:50%;
    border:2px solid var(--line);cursor:pointer;padding:0;
  }
  .setup-color-swatch.sel{border-color:var(--ink);box-shadow:0 0 0 2px var(--paper), 0 0 0 4px var(--ink);}
  .setup-styles{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
  .setup-style-btn{
    display:flex;flex-direction:column;align-items:center;gap:3px;
    width:64px;padding:8px 4px 6px;border-radius:10px;
    border:2px solid var(--line);background:var(--paper);cursor:pointer;
  }
  .setup-style-btn.sel{border-color:var(--ink);background:var(--card);}
  .setup-style-btn .lbl{font-size:10px;color:var(--ink-soft);line-height:1.15;text-align:center;}
  .setup-colors{align-items:center;}
  .setup-toggles{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
  .setup-toggle-btn{
    padding:8px 14px;border-radius:20px;border:2px solid var(--line);
    background:var(--paper);color:var(--ink-soft);font-family:'Inter',sans-serif;
    font-size:12px;font-weight:600;cursor:pointer;
  }
  .setup-toggle-btn.sel{border-color:var(--ink);background:var(--card);color:var(--ink);}
  .setup-add{
    width:100%;padding:12px;border-radius:12px;border:1px dashed var(--line);
    background:transparent;color:var(--ink-soft);font-family:'Inter',sans-serif;
    font-weight:600;font-size:13px;cursor:pointer;margin-bottom:20px;
  }
  .setup-start{
    width:100%;padding:14px;border-radius:12px;border:none;
    background:var(--ink);color:var(--paper);font-family:'Inter',sans-serif;
    font-weight:700;font-size:15px;cursor:pointer;
  }
</style>
</head>
<body>

<div id="setupScreen">
  <div class="setup-wrap">
    <h1>🐾 わんこノートへようこそ</h1>
    <p class="lead">記録するワンちゃんを登録してください。名前と色を選ぶだけです(あとから「はじめる」を押す前なら何匹でも追加・削除できます)。</p>
    <div id="setupDogList"></div>
    <button class="setup-add" id="setupAddDog">＋ ワンちゃんを追加</button>
    <button class="setup-start" id="setupStart">はじめる</button>
  </div>
</div>

<header>
  <h1>🐾 <span>わんこ</span>ノート</h1>
  <div class="tags" id="tags"></div>
</header>

<main>
  <div class="today-strip">
    <div style="display:flex;align-items:center;gap:10px;">
      <div id="dogHeaderIcon" style="width:38px;height:38px;flex:0 0 auto;"></div>
      <div>
        <div class="dogname" id="dogname"></div>
        <div class="sub" id="dogsub"></div>
      </div>
    </div>
  </div>

  <div style="position:relative;margin-bottom:14px;">
    <input id="searchBox" type="text" placeholder="🔍 犬の名前・日付・メモで検索(例:発作、Mama、7/3)"
      style="width:100%;padding:11px 34px 11px 14px;border-radius:12px;border:1px solid var(--line);background:var(--card);font-family:'Inter',sans-serif;font-size:13px;">
    <button id="searchClear" style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:none;color:var(--ink-soft);font-size:16px;cursor:pointer;">✕</button>
  </div>

  <div class="quickadd">
    <button class="qbtn meal" data-type="meal"><span class="ic">🍖</span>ごはん</button>
    <button class="qbtn walk" data-type="walk"><span class="ic">🚶</span>散歩</button>
    <button class="qbtn poop" data-type="poop"><span class="ic">💩</span>うんち</button>
    <button class="qbtn med" data-type="med"><span class="ic">💊</span>お薬</button>
    <button class="qbtn note" data-type="note"><span class="ic">📝</span>気になる</button>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:8px;">
    <button id="calendarBtn" style="flex:1;font-size:11px;padding:8px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);cursor:pointer;">📅 カレンダー</button>
    <button id="backupBtn" style="flex:1;font-size:11px;padding:8px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);cursor:pointer;">バックアップを表示</button>
    <button id="restoreBtn" style="flex:1;font-size:11px;padding:8px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);cursor:pointer;">バックアップを復元</button>
  </div>
  <div style="margin-bottom:8px;">
    <button id="manageDogsBtn" style="width:100%;font-size:12px;padding:10px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-weight:600;cursor:pointer;">🐾 犬を管理(追加・編集・削除)</button>
  </div>
  <div style="margin-bottom:14px;">
    <button id="resetSetupBtn" style="width:100%;font-size:10px;padding:6px;border-radius:10px;border:1px dashed var(--line);background:transparent;color:var(--ink-soft);cursor:pointer;">⚠️ 全部消して最初からやり直す(テスト用・記録も全消去)</button>
  </div>

  <div class="calendarPanel" id="calendarPanel">
    <div class="cal-nav">
      <button id="calPrev">‹</button>
      <div class="cal-label" id="calLabel"></div>
      <button id="calNext">›</button>
    </div>
    <div class="cal-grid" id="calendarGrid"></div>
    <div class="cal-legend" id="calLegend"></div>
  </div>

  <div id="backupPanel" style="display:none;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px;">
    <div style="font-size:12px;color:var(--ink-soft);margin-bottom:8px;" id="backupPanelLabel"></div>
    <textarea id="backupText" style="width:100%;min-height:120px;font-family:monospace;font-size:11px;border-radius:8px;border:1px solid var(--line);padding:8px;background:#fff;"></textarea>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button id="backupCopyBtn" style="flex:1;font-size:12px;padding:9px;border-radius:8px;border:none;background:var(--ink);color:var(--paper);cursor:pointer;"></button>
      <button id="backupCloseBtn" style="flex:1;font-size:12px;padding:9px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);cursor:pointer;">閉じる</button>
    </div>
  </div>

  <div id="timeline"></div>
  <div class="status" id="status"></div>
</main>

<div class="overlay" id="overlay">
  <div class="sheet">
    <h2><span id="sheetIcon"></span><span id="sheetTitle"></span></h2>
    <input type="time" id="entryTime">
    <div class="chiprow" id="chiprow"></div>
    <textarea id="entryText" placeholder="メモ(任意)"></textarea>
    <div class="actions">
      <button class="cancel" id="cancelBtn">やめる</button>
      <button class="save" id="saveBtn">記録する</button>
    </div>
  </div>
</div>

<div class="overlay" id="dayOverlay">
  <div class="sheet">
    <h2 id="dayTitle"></h2>
    <div class="quickadd" id="dayQuickadd"></div>
    <div id="dayEntries"></div>
    <div class="actions">
      <button class="cancel" id="dayCloseBtn">閉じる</button>
    </div>
  </div>
</div>

<div class="overlay" id="manageOverlay">
  <div class="sheet">
    <h2>🐾 犬を管理</h2>
    <p style="font-size:12px;color:var(--ink-soft);margin:-8px 0 14px;line-height:1.6;">名前・見た目の編集、追加、削除ができます。「キャンセル」を押せば何も変更されません。削除も「保存する」を押すまでは確定しないので、安心して試せます。</p>
    <div id="manageDogList"></div>
    <button class="setup-add" id="manageAddDog">＋ ワンちゃんを追加</button>
    <div class="actions">
      <button class="cancel" id="manageCancelBtn">キャンセル</button>
      <button class="save" id="manageSaveBtn">保存する</button>
    </div>
  </div>
</div>

<script>
// Built-in defaults — this is what Mo's own browser already has data
// recorded against, so it must keep working exactly as before.
const DEFAULT_DOGS = [
  {id:'chang',  name:'Chang',  coat:'#C68A4E', ears:'semi', mask:true,  color:'#C68A4E', sub:'15歳・ボクサー'},
  {id:'carmen', name:'Carmen', coat:'#2E2C2A', ears:'semi', mask:false, color:'#2E2C2A', sub:'黒い雑種・Mamaより年上'},
  {id:'mama',   name:'Mama',   coat:'#2E2C2A', ears:'semi', mask:false, patch:true, color:'#2E2C2A', sub:'黒い雑種・2歳くらい'},
  {id:'junior', name:'Junior', coat:'#8A5A2B', ears:'semi', mask:false, color:'#8A5A2B', sub:'茶色い雑種・やんちゃ盛り'},
];

// The actual dog list in use on this browser. Populated by initDogs()
// before anything else runs — either from a saved config, migrated from
// DEFAULT_DOGS, or entered fresh via the setup screen.
let DOGS = [];

// 犬の毛色として自然な6色(赤は使わない)。
// クリームは背景(paper/card)がどちらも白系のため、埋もれないよう
// 黄味を効かせた色にしてある。三毛の下地色にも使う。
const CREAM = '#F3E2B3';
const GRAY = '#8B8B82';

// 毛色・柄は1つだけ選ぶ(単色 or 三毛/ダルメシアンのような「柄」も
// ここに同居させる — 三毛やダルメシアンはそれ自体が色なので、単色の
// スウォッチと同列に選べる方が自然、という判断)。
// type:'solid' はカラースウォッチ(丸)、type:'pattern' はプレビュー
// アイコン(小さい犬の絵)で表示する。
const COLOR_OPTIONS = [
  {key:'cream',     type:'solid',   hex:CREAM,        label:'クリーム'},
  {key:'black',     type:'solid',   hex:'#2E2C2A',    label:'黒'},
  {key:'gray',      type:'solid',   hex:GRAY,         label:'グレー'},
  {key:'yellow',    type:'solid',   hex:'#E7B93E',    label:'黄色'},
  {key:'ocher',     type:'solid',   hex:'#B8863E',    label:'黄土色'},
  {key:'brown',     type:'solid',   hex:'#7A4A24',    label:'茶色'},
  {key:'tricolor',  type:'pattern', pattern:'tricolor',  label:'三毛'},
  {key:'dalmatian', type:'pattern', pattern:'dalmatian', label:'ブチ'},
];

// 耳の形(色・柄とは独立して選ぶ)
const EAR_PRESETS = [
  {key:'floppy', label:'たれ耳',   ears:'floppy'},
  {key:'semi',   label:'半立ち耳', ears:'semi'},
  {key:'pointy', label:'立ち耳',   ears:'pointy'},
];

// マズル黒・胸白は単独のON/OFFトグル。単色でも三毛/ダルメシアンでも、
// どのカラーとも自由に組み合わせられる(排他選択ではない)。
const MARK_TOGGLES = [
  {key:'mask',  label:'マズル黒', prop:'mask'},
  {key:'patch', label:'胸に白',   prop:'patch'},
];

// Ear shape is a selectable trait: 'floppy', 'semi', or 'pointy'.
// Floppy ears hang down the sides of the face with no silhouette above
// the head, so from a distance they read as "barely there". Pointy ears
// spike straight up to a sharp apex. 'semi' sits between the two — small
// and upright at the base like pointy ears, but the tip folds over in a
// curve instead of coming to a point (rose/tulip ear).
function earsSVG(dog){
  if(dog.ears === 'pointy'){
    return `
    <path d="M27 32 L15 4 L40 24 Z" fill="${dog.coat}"/>
    <path d="M69 32 L81 4 L56 24 Z" fill="${dog.coat}"/>`;
  }
  if(dog.ears === 'semi'){
    return `
    <path d="M28 32 Q20 20 22 8 Q28 3 33 9 Q35 16 31 21 Q29 27 28 32 Z" fill="${dog.coat}"/>
    <path d="M68 32 Q76 20 74 8 Q68 3 63 9 Q61 16 65 21 Q67 27 68 32 Z" fill="${dog.coat}"/>`;
  }
  return `
    <path d="M28 26 Q14 34 17 54 Q22 62 29 58 Q26 42 33 30 Z" fill="${dog.coat}"/>
    <path d="M68 26 Q82 34 79 54 Q74 62 67 58 Q70 42 63 30 Z" fill="${dog.coat}"/>`;
}

// Ear-shape-only preview (no body/head), used in the ear picker so the
// choice is judged purely on silhouette rather than "which brown dog do
// I like better".
function earOnlyIconSVG(earsShape, size){
  const s = size || 34;
  const neutral = {coat: GRAY, ears: earsShape};
  return `<svg class="icon" width="${s}" height="${s}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${earsSVG(neutral)}</svg>`;
}

// Flat circular swatch for the tricolor / brindle-spot ("ブチ") patterns,
// drawn the same size/shape as the plain color swatches so all the
// 毛色・柄 options sit in one consistent row — no full dog illustration.
function patternSwatchIconSVG(patternKey, size){
  const s = size || 30;
  if(patternKey === 'dalmatian'){
    return `<svg width="${s}" height="${s}" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
      <circle cx="15" cy="15" r="15" fill="${GRAY}"/>
      <circle cx="10" cy="10" r="2" fill="${CREAM}"/>
      <circle cx="20" cy="9" r="1.6" fill="${CREAM}"/>
      <circle cx="16" cy="18" r="2.1" fill="${CREAM}"/>
      <circle cx="9" cy="19" r="1.6" fill="${CREAM}"/>
      <circle cx="21" cy="19" r="1.4" fill="${CREAM}"/>
    </svg>`;
  }
  if(patternKey === 'tricolor'){
    return `<svg width="${s}" height="${s}" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
      <circle cx="15" cy="15" r="15" fill="${CREAM}"/>
      <circle cx="22" cy="8" r="2.1" fill="#2E2C2A"/>
      <circle cx="8" cy="22" r="1.9" fill="#9A6B3A"/>
      <circle cx="23" cy="21" r="1.5" fill="#2E2C2A"/>
      <circle cx="7" cy="9" r="1.4" fill="#9A6B3A"/>
    </svg>`;
  }
  return '';
}

// Extra markings painted on top of a solid base coat. Dalmatian and
// tricolor coats always sit on a cream base (set via baseCoat in
// dogIconSVG below) regardless of the chosen color swatch, since real
// dalmatian/tricolor coloring isn't really "pick one color".
function patternOverlaySVG(dog){
  if(dog.pattern === 'dalmatian'){
    // Gray base (set in dogIconSVG) with cream spots — kept visually
    // distinct from the tricolor's cream base + dark patches.
    return `
    <circle cx="41" cy="34" r="1.7" fill="${CREAM}"/>
    <circle cx="58" cy="31" r="1.5" fill="${CREAM}"/>
    <circle cx="60" cy="46" r="1.3" fill="${CREAM}"/>
    <circle cx="38" cy="47" r="1.3" fill="${CREAM}"/>
    <circle cx="53" cy="59" r="2" fill="${CREAM}"/>
    <circle cx="36" cy="63" r="1.6" fill="${CREAM}"/>
    <circle cx="66" cy="65" r="1.5" fill="${CREAM}"/>
    <circle cx="31" cy="79" r="1.3" fill="${CREAM}"/>
    <circle cx="69" cy="81" r="1.3" fill="${CREAM}"/>
    <circle cx="48" cy="73" r="1.2" fill="${CREAM}"/>`;
  }
  if(dog.pattern === 'tricolor'){
    // Small dot cluster tucked into the body's lower edges/corners
    // (haunches, tail base) — deliberately kept away from the face so it
    // still reads clearly when combined with マズル黒.
    return `
    <circle cx="73" cy="58" r="2.1" fill="#2E2C2A"/>
    <circle cx="77" cy="66" r="1.5" fill="#2E2C2A"/>
    <circle cx="70" cy="73" r="1.7" fill="#9A6B3A"/>
    <circle cx="26" cy="71" r="1.9" fill="#9A6B3A"/>
    <circle cx="22" cy="79" r="1.5" fill="#2E2C2A"/>
    <circle cx="31" cy="81" r="1.4" fill="#9A6B3A"/>`;
  }
  return '';
}

// Simple sitting-dog silhouette. `coat` tints the body for a solid-color
// dog; `pattern` ('solid' | 'tricolor' | 'dalmatian') overrides that with
// a cream base plus painted-on markings instead. `ears` picks the ear
// shape; `mask` adds a boxer-style dark muzzle; `patch` adds a small
// chest marking — both only apply when pattern is 'solid'.
function dogIconSVG(dog, size){
  const s = size || 34;
  const pattern = dog.pattern || 'solid';
  const baseCoat = pattern === 'solid' ? dog.coat : (pattern === 'dalmatian' ? GRAY : CREAM);
  const maskShape = dog.mask ? `<ellipse cx="50" cy="40" rx="13" ry="10" fill="#2E2C2A" opacity="0.85"/>` : '';
  const patchShape = dog.patch ? `<ellipse cx="46" cy="60" rx="7" ry="9" fill="#F5EFE3" opacity="0.9"/>` : '';
  return `
  <svg class="icon" width="${s}" height="${s}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="50" cy="66" rx="26" ry="20" fill="${baseCoat}"/>
    <ellipse cx="30" cy="80" rx="7" ry="10" fill="${baseCoat}"/>
    <ellipse cx="66" cy="80" rx="7" ry="10" fill="${baseCoat}"/>
    <path d="M74 55 Q92 45 88 30 Q80 34 72 46 Z" fill="${baseCoat}"/>
    <circle cx="48" cy="38" r="20" fill="${baseCoat}"/>
    ${earsSVG({...dog, coat: baseCoat})}
    ${maskShape}
    <circle cx="40" cy="36" r="2.4" fill="#20201E"/>
    <circle cx="56" cy="36" r="2.4" fill="#20201E"/>
    <ellipse cx="48" cy="46" rx="4" ry="3" fill="#20201E"/>
    ${patchShape}
    ${patternOverlaySVG(dog)}
  </svg>`;
}

function pad2(n){ return String(n).padStart(2,'0'); }

// Local (browser timezone) date string, e.g. "2026-07-12".
// IMPORTANT: do NOT use toISOString() here — that returns the UTC date,
// which drifts to the next/previous day depending on the user's timezone
// offset (e.g. in Mexico, evening local time is already the next day in UTC).
function localDateStr(d){
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}
function todayStr(){ return localDateStr(new Date()); }

function fmtDayLabel(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const today = todayStr();
  const y = localDateStr(new Date(Date.now()-86400000));
  if(dateStr===today) return '今日';
  if(dateStr===y) return '昨日';
  return d.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',weekday:'short'});
}

function renderTags(){
  const wrap = $('tags');
  wrap.innerHTML = '';
  DOGS.forEach(dog=>{

    el.style.setProperty('--dogcolor', dog.color);

    el.onclick = ()=>{ activeDog = dog.id; renderAll(); };
    wrap.appendChild(el);
  });
}

function renderHeader(){
  const dog = DOGS.find(d=>d.id===activeDog);
  $('dogname').textContent = dog.name;
  $('dogname').style.color = dog.color;
  $('dogsub').textContent = dog.sub || '';

function dateSearchStrings(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const m = d.getMonth()+1, day = d.getDate();
  const weekday = d.toLocaleDateString('ja-JP',{weekday:'short'});
  return [
    dateStr,
    `${m}/${day}`,
    `${m}月${day}日`,
    weekday,
    fmtDayLabel(dateStr),
  ].join(' ');
}

function renderTimeline(){
  const wrap = $('timeline');
  wrap.innerHTML = '';
  const query = $('searchBox').value.trim().toLowerCase();

  if(query){
    let all = [];
    DOGS.forEach(dog=>{
      (logs[dog.id]||[]).forEach(e=>{
        all.push({...e, dogId: dog.id});
      });
    });
    all = all.filter(e=>{
      const dog = DOGS.find(d=>d.id===e.dogId);
      const t = TYPES[e.type];
      const day = e.at.slice(0,10);
      const corpus = [
        dog.name, dog.sub, t.label, e.chip||'', e.text||'', dateSearchStrings(day)
      ].join(' ').toLowerCase();
      return corpus.includes(query);
    });
    all.sort((a,b)=> b.at.localeCompare(a.at));

    if(all.length===0){
      wrap.innerHTML = '<div class="empty">一致する記録が見つかりませんでした。</div>';
      return;
    }
    const byDay = {};
    all.forEach(e=>{
      const day = e.at.slice(0,10);
      if(!byDay[day]) byDay[day]=[];
      byDay[day].push(e);
    });
    Object.keys(byDay).sort().reverse().forEach(day=>{
      const label = document.createElement('div');
      label.className='daylabel';
      label.textContent = fmtDayLabel(day);
      wrap.appendChild(label);
      byDay[day].forEach(e=>{
        const dog = DOGS.find(d=>d.id===e.dogId);
        const t = TYPES[e.type];
        const row = document.createElement('div');
        row.className='entry';
        row.style.setProperty('--c', t.color);
        const time = e.at.slice(11,16);
        row.innerHTML = `
          <div class="ic">${t.icon}</div>
          <div class="body">
            <div class="time">${time} ・ <b style="color:${dog.color}">${dog.name}</b> ・ ${t.label}${e.chip? ' ・ '+e.chip:''}</div>
            ${e.text? `<div class="text">${escapeHtml(e.text)}</div>` : ''}
          </div>
        `;
        wrap.appendChild(row);
      });
    });
    return;
  }

  const entries = (logs[activeDog]||[]).slice().sort((a,b)=> b.at.localeCompare(a.at));
  if(entries.length===0){
    wrap.innerHTML = '<div class="empty">まだ記録がありません。上のボタンから記録してみましょう。</div>';
    return;
  }
  const byDay = {};
  entries.forEach(e=>{
    const day = e.at.slice(0,10);
    if(!byDay[day]) byDay[day]=[];
    byDay[day].push(e);
  });
  Object.keys(byDay).sort().reverse().forEach(day=>{
    const label = document.createElement('div');
    label.className='daylabel';
    label.textContent = fmtDayLabel(day);
    wrap.appendChild(label);
    byDay[day].forEach(e=>{
      const t = TYPES[e.type];
      const row = document.createElement('div');
      row.className='entry';
      row.style.setProperty('--c', t.color);
      const time = e.at.slice(11,16);
      row.innerHTML = `
        <div class="ic">${t.icon}</div>
        <div class="body">
          <div class="time">${time} ・ ${t.label}${e.chip? ' ・ '+e.chip:''}</div>
          ${e.text? `<div class="text">${escapeHtml(e.text)}</div>` : ''}
        </div>
        <button class="del" data-id="${e.id}">✕</button>
      `;
      wrap.appendChild(row);
    });
  });
  wrap.querySelectorAll('.del').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.dataset.id;
      await withFreshLogs(()=>{
        logs[activeDog] = (logs[activeDog]||[]).filter(e=>e.id!==id);
      });
      renderTimeline();
      renderCalendar();
    };
  });
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderAll(){
  renderTags();
  renderHeader();
  renderTimeline();
  renderCalendar();

/* ---------- Calendar ---------- */

function renderCalendar(){
  const grid = $('calendarGrid');
  const y = calState.year, m = calState.month;
  $('calLabel').textContent = `${y}年${m+1}月`;
  grid.innerHTML = '';

  ['日','月','火','水','木','金','土'].forEach(wd=>{
    const el = document.createElement('div');
    el.className='cal-wd';
    el.textContent = wd;
    grid.appendChild(el);
  });

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const today = todayStr();

  for(let i=0;i<firstDay;i++){
    const el = document.createElement('div');
    el.className='cal-day empty';
    grid.appendChild(el);
  }

  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${y}-${pad2(m+1)}-${pad2(d)}`;
    const entries = (logs[activeDog]||[]).filter(e=>e.at.slice(0,10)===dateStr);
    const noteEntries = entries.filter(e=>e.type==='note' && e.text);
    const hasNote = noteEntries.length>0;
    const snippet = hasNote ? escapeHtml(noteEntries[0].text.slice(0,3)) : '';

    const el = document.createElement('div');
    el.className = 'cal-day' + (dateStr===today?' today':'') + (hasNote?' has-note':'');
    el.innerHTML = `
      <span>${d}</span>
      ${hasNote?`<div class="note-snippet">${snippet}</div>`:''}
    `;
    el.onclick = ()=> openDayDetail(dateStr);
    grid.appendChild(el);
  }

  $('calLegend').innerHTML = '<span><span class="dot" style="background:var(--note)"></span>気になったことがある日</span>';
}

$('calPrev').onclick = ()=>{
  calState.month--;
  if(calState.month<0){ calState.month=11; calState.year--; }
  renderCalendar();
};
$('calNext').onclick = ()=>{
  calState.month++;
  if(calState.month>11){ calState.month=0; calState.year++; }
  renderCalendar();
};

$('calendarBtn').onclick = ()=>{
  const panel = $('calendarPanel');
  const showing = panel.style.display === 'block';
  panel.style.display = showing ? 'none' : 'block';

};

// Reads the latest saved data fresh from storage, applies `mutator` to it,
// then saves. This avoids a stale tab (holding old data in memory) blindly
// overwriting newer changes saved from another tab/session.
//
// IMPORTANT: we save with saveLogsPlain() (a straight overwrite), not
// saveLogsWithRetry() (which merges with whatever is currently in
// localStorage). Since we've already refreshed `logs` from localStorage
// just above, a merge here would re-combine a just-deleted entry with the
// still-old copy in storage and silently resurrect it — which is why the
// ✕ delete button looked like it "did nothing."
async function withFreshLogs(mutator){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    logs = raw ? JSON.parse(raw) : {};
  }catch(e){ /* keep in-memory logs as fallback */ }
  mutator();
  await saveLogsPlain();
}

async function saveEntry(){
  const time = $('entryTime').value || new Date().toTimeString().slice(0,5);
  const text = $('entryText').value.trim();
  const date = pendingDate || todayStr();
  const entry = {
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    type: pendingType,
    at: `${date}T${time}`,
    chip: pendingChip,
    text: text,
  };
  await withFreshLogs(()=>{
    if(!logs[activeDog]) logs[activeDog]=[];
    logs[activeDog].push(entry);
  });
  closeSheet();
  renderAll();
  if(currentDayDate){ renderDayEntries(currentDayDate); }
}

const STORAGE_KEY = 'dog-tracker-logs-v1';
const DOGS_KEY = 'dog-tracker-dogs-v1';

async function loadLogs(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    logs = raw ? JSON.parse(raw) : {};
    $('status').textContent = '';
  }catch(e){
    logs = {};
    $('status').textContent = '⚠️ このブラウザでは保存機能が使えないようです。';
  }
}

// Union-merge two {dogId: [entries]} objects by entry id, so a save from
// a stale tab can never silently erase entries that another tab already
// persisted.
function mergeLogs(a, b){
  const result = {};
  const dogIds = new Set([...Object.keys(a||{}), ...Object.keys(b||{})]);
  dogIds.forEach(id=>{
    const byId = new Map();
    (a[id]||[]).forEach(e=>byId.set(e.id, e));
    (b[id]||[]).forEach(e=>byId.set(e.id, e));
    result[id] = Array.from(byId.values());
  });
  return result;
}

async function saveLogs(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    const persisted = raw ? JSON.parse(raw) : {};
    logs = mergeLogs(persisted, logs);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    const now = new Date();
    $('status').textContent = `最終保存 ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}(この端末に保存)`;
  }catch(e){
    $('status').textContent = `⚠️ 保存エラー: ${e && e.message ? e.message : e}`;
  }
}

async function saveLogsPlain(){
  // Straightforward overwrite (no merge), so both deletions and new
  // entries saved via withFreshLogs() always take effect immediately in
  // the tab that performed them.
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    const now = new Date();
    $('status').textContent = `最終保存 ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}(この端末に保存)`;
  }catch(e){
    $('status').textContent = `⚠️ 保存エラー: ${e && e.message ? e.message : e}`;
  }
}

async function saveLogsWithRetry(){
  await saveLogs();
}

  backupMode = 'view';
  $('backupPanelLabel').textContent = 'この内容を長押しして全選択→コピーし、メモアプリなどに保存してください。(犬のリストと記録の両方が含まれます)';
  $('backupText').readOnly = true;
  $('backupText').value = JSON.stringify({dogs: DOGS, logs: logs}, null, 2);
  $('backupCopyBtn').textContent = 'コピーする';
  $('backupPanel').style.display = 'block';
  $('backupPanel').scrollIntoView({behavior:'smooth', block:'center'});
};

$('restoreBtn').onclick = ()=>{
  backupMode = 'restore';
  $('backupPanelLabel').textContent = '保存しておいたバックアップ内容をここに貼り付けて「復元する」を押してください。(犬のリストごと復元されるので、削除した犬も元通りになります)';
  $('backupText').readOnly = false;
  $('backupText').value = '';
  $('backupCopyBtn').textContent = '復元する';
  $('backupPanel').style.display = 'block';
  $('backupPanel').scrollIntoView({behavior:'smooth', block:'center'});
};

$('backupCloseBtn').onclick = ()=>{
  $('backupPanel').style.display = 'none';
};

$('resetSetupBtn').onclick = ()=>{
  const ok = confirm('この端末に保存されている犬のリストと、すべての記録が消えます。バックアップを取っていない記録は復元できません。本当に最初からやり直しますか?');
  if(!ok) return;
  try{
    localStorage.removeItem(DOGS_KEY);
    localStorage.removeItem(STORAGE_KEY);
  }catch(e){}
  location.reload();
};

$('backupCopyBtn').onclick = async ()=>{
  if(backupMode === 'view'){
    $('backupText').select();
    $('backupText').setSelectionRange(0, 999999);
    try{
      await navigator.clipboard.writeText($('backupText').value);
      $('backupPanelLabel').textContent = 'コピーしました。メモアプリなどに貼り付けて保存してください。';
    }catch(e){
      $('backupPanelLabel').textContent = 'テキストを選択したので、そのままコピーしてください(自動コピーは使えませんでした)。';
    }
  }else{
    try{
      const parsed = JSON.parse($('backupText').value);
      if(parsed && Array.isArray(parsed.dogs) && parsed.logs && typeof parsed.logs==='object'){
        // Current format: dogs + logs bundled together, so restoring
        // always reconnects the right records to the right dog by id.
        DOGS = parsed.dogs;
        logs = parsed.logs;
        saveDogsConfig();
      }else if(parsed && typeof parsed==='object' && !Array.isArray(parsed)){
        // Backward compatibility with older backups that contained only
        // the logs object (no dog roster). The dog list already on this
        // browser is left untouched in that case.
        logs = parsed;
      }else{
        throw new Error('unexpected backup format');
      }
      if(DOGS.length===0){
        await saveLogsPlain();
        $('backupPanel').style.display = 'none';
        location.reload();
        return;
      }
      if(!DOGS.find(d=>d.id===activeDog)){
        activeDog = DOGS[0].id;
      }
      renderAll();
      $('backupPanelLabel').textContent = '復元しました。保存も試みます…';
      await saveLogsPlain();
      $('backupPanel').style.display = 'none';
    }catch(e){
      $('backupPanelLabel').textContent = '⚠️ 内容を読み込めませんでした。貼り付けた内容を確認してください。';
    }
  }
};

/* ---------- Dogs config (per-browser) & first-time setup ---------- */

function loadDogsConfig(){
  try{
    const raw = localStorage.getItem(DOGS_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}

function saveDogsConfig(){
  try{ localStorage.setItem(DOGS_KEY, JSON.stringify(DOGS)); }catch(e){}
}

function hasExistingLogEntries(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const parsed = JSON.parse(raw);
    return Object.keys(parsed).some(k => Array.isArray(parsed[k]) && parsed[k].length>0);
  }catch(e){ return false; }
}

// Decides which dog list this browser should use, without ever touching
// data that's already recorded. Three cases:
//  1. A dogs-config was already saved here (Mo's browser after first run,
//     or a friend who already completed setup) -> just use it.
//  2. No dogs-config yet, but there are already log entries in this
//     browser's storage -> this is Mo's existing browser from before the
//     setup screen existed. Silently adopt the built-in defaults as the
//     config so nothing changes for her.
//  3. Neither config nor logs exist -> a brand new browser (e.g. a
//     friend's phone). Setup screen is needed.
// Returns true if DOGS is ready to use, false if setup is required.
function initDogs(){
  const saved = loadDogsConfig();
  if(saved && Array.isArray(saved) && saved.length){
    DOGS = saved;
    return true;
  }
  if(hasExistingLogEntries()){
    DOGS = DEFAULT_DOGS;
    saveDogsConfig();
    return true;
  }
  return false;
}

// Builds one editable dog row, used both by the first-time setup screen
// (dog=null, showDelete:false) and the "犬を管理" screen (dog=existing
// dog, showDelete:true). Nothing here touches localStorage — the row only
// holds form state until the caller reads it back with collectDogFromRow().
function createDogRow(dog, opts){
  opts = opts || {};
  const row = document.createElement('div');
  row.className = 'setup-row';
  row.dataset.existingId = (dog && dog.id) ? dog.id : '';
  row.innerHTML = `
    <div class="setup-row-top">
      <input type="text" class="setup-name" placeholder="名前(例: ポチ)" value="${dog ? escapeHtml(dog.name||'') : ''}">
      <button type="button" class="setup-remove" title="削除">${opts.showDelete ? '🗑' : '✕'}</button>
    </div>
    <input type="text" class="setup-sub" placeholder="ひとこと(任意・例: 3歳、柴犬)" value="${dog ? escapeHtml(dog.sub||'') : ''}">
    <div class="setup-field-label">耳の形</div>
    <div class="setup-styles setup-ears"></div>
    <div class="setup-field-label">毛色・柄</div>
    <div class="setup-colors"></div>
    <div class="setup-field-label">追加の模様(自由に組み合わせ可)</div>
    <div class="setup-toggles"></div>
  `;

  // --- 耳の形(輪郭だけのプレビュー) ---
  const earsWrap = row.querySelector('.setup-ears');
  const currentEarsKey = (dog && dog.ears==='pointy') ? 'pointy'
    : (dog && dog.ears==='semi') ? 'semi'
    : 'floppy';
  EAR_PRESETS.forEach((ep)=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'setup-style-btn' + (ep.key===currentEarsKey ? ' sel' : '');
    btn.dataset.ears = ep.key;
    btn.innerHTML = `${earOnlyIconSVG(ep.ears,34)}<span class="lbl">${ep.label}</span>`;
    btn.onclick = ()=>{
      earsWrap.querySelectorAll('.setup-style-btn').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
    };
    earsWrap.appendChild(btn);
  });

  // --- 毛色・柄(単色スウォッチと、三毛/ブチの柄入り丸スウォッチを同列
  //     で1つだけ選ぶ。柄も色と同じ「丸」で表現し、犬のイラストは出さない) ---
  const colorWrap = row.querySelector('.setup-colors');
  const currentColorHex = dog ? dog.color : null;
  const currentPattern = (dog && dog.pattern) || 'solid';
  const hasExactSolidMatch = currentPattern==='solid' && currentColorHex &&
    COLOR_OPTIONS.some(c=>c.type==='solid' && c.hex.toLowerCase()===currentColorHex.toLowerCase());

  const optionList = [];
  if(currentPattern==='solid' && currentColorHex && !hasExactSolidMatch){
    // Existing dogs created before this palette (or with a custom hex)
    // keep their original color as a selected first swatch, so opening
    // the manage screen never silently changes their look.
    optionList.push({key:'__custom', type:'solid', hex: currentColorHex, label:'現在の色'});
  }
  optionList.push(...COLOR_OPTIONS);

  optionList.forEach((c,i)=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    let isSel;
    if(currentPattern !== 'solid'){
      isSel = (c.type==='pattern' && c.pattern===currentPattern);
    } else if(currentColorHex){
      isSel = (c.type==='solid' && c.hex.toLowerCase()===currentColorHex.toLowerCase());
    } else {
      isSel = (i===0);
    }
    btn.dataset.optionKey = c.key;
    btn.dataset.type = c.type;
    btn.title = c.label;
    if(c.type === 'solid'){
      btn.className = 'setup-color-swatch' + (isSel ? ' sel' : '');
      btn.style.background = c.hex;
      btn.dataset.hex = c.hex;
    } else {
      btn.className = 'setup-color-swatch' + (isSel ? ' sel' : '');
      btn.dataset.pattern = c.pattern;
      btn.innerHTML = patternSwatchIconSVG(c.pattern, 30);
    }
    btn.onclick = ()=>{
      colorWrap.querySelectorAll('.setup-color-swatch').forEach(s=>s.classList.remove('sel'));
      btn.classList.add('sel');
    };
    colorWrap.appendChild(btn);
  });

  // --- 追加の模様(マズル黒・胸白):単独ON/OFF。どのカラー/柄とも併用可。
  //     言葉だけだと伝わりにくいので、耳と同様にグレーの簡易シルエット
  //     でその模様自体を見せる。 ---
  const togglesWrap = row.querySelector('.setup-toggles');
  MARK_TOGGLES.forEach(mt=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    const isOn = dog ? !!dog[mt.prop] : false;
    btn.className = 'setup-style-btn setup-toggle-btn' + (isOn ? ' sel' : '');
    btn.dataset.markKey = mt.key;
    const previewDog = {coat:GRAY, ears:'floppy', mask: mt.prop==='mask', patch: mt.prop==='patch', pattern:'solid'};
    btn.innerHTML = `${dogIconSVG(previewDog,34)}<span class="lbl">${mt.label}</span>`;
    btn.onclick = ()=>{ btn.classList.toggle('sel'); };
    togglesWrap.appendChild(btn);
  });

  row.querySelector('.setup-remove').onclick = ()=>{
    if(opts.showDelete){
      if(row.dataset.existingId){
        const ok = confirm(`「${dog ? dog.name : ''}」を削除します。保存を押すと確定し、この犬の記録もこの端末から削除されます。よろしいですか?`);
        if(!ok) return;
      }
      row.remove();
    } else {
      if($('setupDogList').children.length>1){ row.remove(); }
    }
  };
  return row;
}

// Reads one row's form fields back into a plain dog object (without id).
// Returns null if the name field was left blank, so blank rows are
// silently skipped by both the setup screen and the manage screen.
function collectDogFromRow(row){
  const name = row.querySelector('.setup-name').value.trim();
  if(!name) return null;
  const sub = row.querySelector('.setup-sub').value.trim();

  const earsBtn = row.querySelector('.setup-ears .setup-style-btn.sel');
  const earsKey = earsBtn ? earsBtn.dataset.ears : EAR_PRESETS[0].key;
  const ears = (EAR_PRESETS.find(e=>e.key===earsKey) || EAR_PRESETS[0]).ears;

  const selColorBtn = row.querySelector('.setup-colors .sel');
  let pattern = 'solid';
  let color = COLOR_OPTIONS[0].hex;
  if(selColorBtn){
    if(selColorBtn.dataset.type === 'pattern'){
      pattern = selColorBtn.dataset.pattern;
      // Accent color used for UI bits (active tab border, name text) —
      // patterns aren't a single hex, so pick a representative accent.
      color = (pattern === 'dalmatian') ? GRAY : '#2E2C2A';
    } else {
      color = selColorBtn.dataset.hex;
    }
  }

  let mask = false, patch = false;
  row.querySelectorAll('.setup-toggle-btn.sel').forEach(btn=>{
    const mt = MARK_TOGGLES.find(m=>m.key===btn.dataset.markKey);
    if(!mt) return;
    if(mt.prop==='mask') mask = true;
    if(mt.prop==='patch') patch = true;
  });

  return {name, sub, coat:color, color, ears, mask, patch, pattern};
}

function createSetupRow(){
  return createDogRow(null, {showDelete:false});
}

function showSetupScreen(){
  document.querySelector('header').style.display = 'none';
  document.querySelector('main').style.display = 'none';
  $('setupScreen').style.display = 'block';
  $('setupDogList').innerHTML = '';
  $('setupDogList').appendChild(createSetupRow());
}

$('setupAddDog').onclick = ()=>{
  if($('setupDogList').children.length >= 8) return;
  $('setupDogList').appendChild(createSetupRow());
};

$('setupStart').onclick = async ()=>{
  const rows = Array.from($('setupDogList').children);
  const newDogs = [];
  rows.forEach((row, i)=>{
    const base = collectDogFromRow(row);
    if(!base) return;
    newDogs.push({ id: 'dog_' + Date.now().toString(36) + '_' + i, ...base });
  });
  if(newDogs.length===0){
    alert('少なくとも1匹、名前を入力してください。');
    return;
  }
  DOGS = newDogs;
  saveDogsConfig();
  $('setupScreen').style.display = 'none';
  document.querySelector('header').style.display = '';
  document.querySelector('main').style.display = '';
  activeDog = DOGS[0].id;
  await loadLogs();
  renderAll();
};

/* ---------- Manage dogs (add / edit / delete a single dog, without
   touching the others; nothing is saved until "保存する" is pressed) ---------- */

$('manageDogsBtn').onclick = ()=>{
  $('manageDogList').innerHTML = '';
  DOGS.forEach(dog=>{
    $('manageDogList').appendChild(createDogRow(dog, {showDelete:true}));
  });
  $('manageOverlay').classList.add('show');
};

$('manageAddDog').onclick = ()=>{
  if($('manageDogList').children.length >= 8) return;
  $('manageDogList').appendChild(createDogRow(null, {showDelete:true}));
};

$('manageCancelBtn').onclick = ()=>{
  $('manageOverlay').classList.remove('show');
};
$('manageOverlay').onclick = (e)=>{ if(e.target.id==='manageOverlay') $('manageOverlay').classList.remove('show'); };

$('manageSaveBtn').onclick = async ()=>{
  const rows = Array.from($('manageDogList').children);
  const finalDogs = [];
  const keptIds = new Set();
  rows.forEach((row, i)=>{
    const base = collectDogFromRow(row);
    if(!base) return;
    const existingId = row.dataset.existingId;
    const id = existingId || ('dog_' + Date.now().toString(36) + '_' + i);
    finalDogs.push({ id, ...base });
    keptIds.add(id);
  });
  if(finalDogs.length===0){
    alert('少なくとも1匹は必要です。');
    return;
  }
  // Refresh logs fresh from storage before mutating, so we never clobber
  // entries saved from another tab/session while this screen was open.
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    logs = raw ? JSON.parse(raw) : {};
  }catch(e){ /* keep in-memory logs as fallback */ }

  // Any dog that existed before this edit but isn't in the kept list was
  // deliberately deleted -> drop its records too.
  DOGS.forEach(d=>{
    if(!keptIds.has(d.id)) delete logs[d.id];
  });

  DOGS = finalDogs;
  saveDogsConfig();
  await saveLogsPlain();
  if(!DOGS.find(d=>d.id===activeDog)){
    activeDog = DOGS[0].id;
  }
  $('manageOverlay').classList.remove('show');
  renderAll();
};

(async ()=>{
  const ready = initDogs();
  if(ready){
    activeDog = DOGS[0].id;
    await loadLogs();
    renderAll();
  }else{
    showSetupScreen();
  }
})();

// If the tab was left open and another tab/session changed the data,
// re-sync as soon as this tab becomes active again.
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible' && DOGS.length){
    loadLogs().then(renderAll);
  }
});
window.addEventListener('pageshow', ()=>{
  if(DOGS.length){
    loadLogs().then(renderAll);
  }
});

</script>
</body></html>
